<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <style>
    /* 二联纸整张 = 241mm 宽 × 279mm 高（两联，每联 139.5mm，中间为撕裂线）。
       一单从上往下连续排，用满 241mm 幅宽，行沿 279mm 高往下延伸。
       只打一张、内容保证落在整张内（行数由模板 min_rows 控制填充），
       不跨张、不换页；撕裂线位置无需特殊处理。文字正着读，PDF 1:1 送打印机，不旋转。 */
    @page {
      size: 241mm 279mm;
      margin: 0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
      font-size: 10.5pt;
      color: #000;
    }

    /* 页面容器：固定为一联实际尺寸。上下留 5mm、左右各 10mm 避开针孔。 */
    .page {
      width: 241mm;
      height: 279mm;
      padding: 5mm 10mm;
    }

    /* ── 品牌名（标题，居中于表格上方） ── */
    .brand {
      font-size: 15pt;
      font-weight: bold;
      text-align: center;
      width: 221mm;          /* 与表格同宽，标题居中（=6列之和） */
      line-height: 1.25;
      padding-bottom: 2pt;
    }

    /* ── 统一网格表格：用满可用幅宽（241 - 左右各10 = 221mm） ── */
    table {
      width: 221mm;          /* 表格 = 6列之和(20+90+22+28+35+26)，用满可用幅宽 */
      border-collapse: collapse;
      table-layout: fixed;
    }

    td, th {
      border: 0.75pt solid #000;
      padding: 1pt 3pt;
      font-size: 10.5pt;
      font-weight: bold;
      line-height: 1.2;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      vertical-align: middle;
      height: 5mm;
    }

    .meta-label { font-weight: bold; text-align: center; }
    thead th { font-weight: bold; text-align: center; }

    /* 分页时表头在每一联顶部重复，商品行不跨页断开 */
    thead { display: table-header-group; }
    tbody tr { break-inside: avoid; page-break-inside: avoid; }

    /* 列宽固定 mm：序号 品种 数量 售价 金额 规格（合计 221mm，用满可用幅宽） */
    col.c-idx   { width: 20mm; }
    col.c-name  { width: 90mm; }
    col.c-qty   { width: 22mm; }
    col.c-price { width: 28mm; }
    col.c-sub   { width: 35mm; }
    col.c-spec  { width: 26mm; }

    /* 补货标记 */
    .tag-rep {
      font-size: 8pt;
      border: 0.5pt solid #000;
      padding: 0 1pt;
      margin-left: 2pt;
    }

    .note-row td { text-align: center; font-size: 9.5pt; }
    .total-row td { font-weight: bold; text-align: center; }

    .al-c { text-align: center; }
    .al-r { text-align: right; }
    .al-l { text-align: left; }
  </style>
</head>
<body>
<div class="page">

  <!-- 客户 / 日期 + 商品明细，统一为一张网格表 -->
  <table>
    <colgroup>
      <col class="c-idx" />
      <col class="c-name" />
      <col class="c-qty" />
      <col class="c-price" />
      <col class="c-sub" />
